version: '3.8'

services:
  streamlit-ui:
    build: .
    container_name: candlestick_app_ui
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - TZ=America/New_York
      - DATABASE_PATH=/app/sentinel.db
    volumes:
      - ./sentinel.db:/app/sentinel.db
      - ./.env:/app/.env
    healthcheck:
      test: ["CMD", "python", "healthcheck.py", "--mode", "ui"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  scanner-worker:
    build: .
    container_name: candlestick_app_worker
    command: python -m scanners.scheduler_daemon
    environment:
      - TZ=America/New_York
      - DATABASE_PATH=/app/sentinel.db
      - SCAN_INTERVAL_MINUTES=15
    volumes:
      - ./sentinel.db:/app/sentinel.db
      - ./.env:/app/.env
    healthcheck:
      test: ["CMD", "python", "healthcheck.py", "--mode", "worker"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
